name: rss to notion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      DATABASE_ID_PAPER: ${{ secrets.DATABASE_ID_PAPER }}  # 👈 只改了这行

    steps:
      - uses: actions/checkout@v4  # 👈 升级，去掉Node.js警告
      - uses: actions/setup-python@v5  # 👈 升级，去掉Node.js警告
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run RSS to Notion System
        run: |
          echo "Starting system..."
          python -u rss_notion_system.py
