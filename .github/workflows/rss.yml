name: rss to notion

on:
  workflow_dispatch:       # 手动触发
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0 点

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      DATABASE_ID: ${{ secrets.DATABASE_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Debug Repository
        run: |
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -al

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --timeout 120
          pip install feedparser requests beautifulsoup4 --timeout 120

      - name: Run RSS to Notion Script
        run: |
          echo "Starting rss_to_notion.py..."
          python rss_to_notion.py
