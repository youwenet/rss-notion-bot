name: RSS to Notion Automation

# 触发方式：每天定时 + 手动触发
on:
  schedule:
    - cron: "0 0 * * *"  # UTC 0 点 = 北京时间 8 点，可改为你本地时间
  workflow_dispatch:       # 手动触发

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      # 让 JavaScript Actions 使用 Node.js 24，消除 warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Notion Secrets 已经在 GitHub Secrets 中设置
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      DATABASE_ID: ${{ secrets.DATABASE_ID }}

    steps:
      # 1️⃣ 拉取仓库代码
      - uses: actions/checkout@v3

      # 2️⃣ 设置 Python 环境
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 安装依赖（如果需要 feedparser、requests 等库）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      # 4️⃣ 运行你的 Python 脚本
      - name: Run RSS to Notion script
        run: python rss_to_notion.py
